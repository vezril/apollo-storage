# Test config: shadows the main application.conf on the test classpath.
# Critically disables JVM-exit on coordinated shutdown so tearing down a test
# ActorSystem does not kill the forked sbt test harness.

include "serialization"

apollostorage {
  http {
    host = "127.0.0.1"
    port = 0
  }
}

pekko {
  loglevel = "INFO"
  loggers = ["org.apache.pekko.event.slf4j.Slf4jLogger"]
  logging-filter = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"

  coordinated-shutdown.exit-jvm = off
  coordinated-shutdown.run-by-jvm-shutdown-hook = off

  actor {
    provider = "local"
  }
}
