# Cluster runtime (design D27-D30). Included by application.conf. A single replica
# still forms a cluster of one; multi-replica forms via Management + Bootstrap.

pekko {
  actor.provider = "cluster"

  remote.artery.canonical {
    hostname = "127.0.0.1"
    hostname = ${?CLUSTER_HOST}
    port = 25520
    port = ${?CLUSTER_PORT}
  }

  cluster {
    # Design target is >=3 for keep-majority quorum; 1 allows a standalone node.
    min-nr-of-members = 1
    min-nr-of-members = ${?CLUSTER_MIN_MEMBERS}

    # Split-brain resolver is mandatory (design D27).
    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"
    split-brain-resolver.active-strategy = "keep-majority"

    sharding.number-of-shards = 256
    sharding.number-of-shards = ${?CLUSTER_NUMBER_OF_SHARDS}
  }
}

# Number of distributed projection instances (slice-range workers, design D30).
apollostorage.projection.instances = 4
apollostorage.projection.instances = ${?PROJECTION_INSTANCES}

pekko.management {
  http {
    hostname = "127.0.0.1"
    hostname = ${?MANAGEMENT_HOST}
    port = 8558
    port = ${?MANAGEMENT_PORT}
  }
  cluster.bootstrap.contact-point-discovery {
    service-name = "apollostorage"
    # config (static, compose) by default; override to kubernetes-api / dns in k8s.
    discovery-method = "config"
    discovery-method = ${?DISCOVERY_METHOD}
    required-contact-point-nr = 1
    required-contact-point-nr = ${?REQUIRED_CONTACT_POINTS}
  }
}

# Static contact points for config discovery (compose). Empty => single node.
pekko.discovery.config.services.apollostorage.endpoints = []
