# Event journal: PostgreSQL via pekko-persistence-r2dbc (design D1). Connection
# parameters default for local/compose and are overridable by environment
# variables (design D8) — no credentials committed. Included by the main
# application.conf only; unit tests use the in-memory persistence testkit journal.

pekko.persistence {
  journal.plugin = "pekko.persistence.r2dbc.journal"
  snapshot-store.plugin = "pekko.persistence.r2dbc.snapshot"
}

pekko.persistence.r2dbc {
  dialect = "postgres"

  connection-factory {
    driver = "postgres"

    host = "localhost"
    host = ${?POSTGRES_HOST}
    port = 5432
    port = ${?POSTGRES_PORT}
    database = "apollostorage"
    database = ${?POSTGRES_DB}
    user = "apollostorage"
    user = ${?POSTGRES_USER}
    password = "apollostorage"
    password = ${?POSTGRES_PASSWORD}

    # Fail fast rather than hang when Postgres is unreachable at startup.
    connect-timeout = 3 seconds
    connect-timeout = ${?POSTGRES_CONNECT_TIMEOUT}
    acquire-retry = 2
  }
}
