# ApolloStorage runtime configuration (design D8).
# Every deployment-varying value is overridable by an environment variable;
# no secrets are committed here.

include "serialization"
include "persistence"
include "cluster"

apollostorage {
  http {
    host = "0.0.0.0"
    host = ${?HTTP_HOST}
    port = 8080
    port = ${?HTTP_PORT}
  }

  blob {
    # Root directory for object payloads (mount NFS/persistent storage here).
    root = "/var/lib/apollostorage/objects"
    root = ${?BLOB_STORE_PATH}
  }

  grpc {
    port = 8443
    port = ${?GRPC_PORT}
  }
}

pekko {
  loglevel = "INFO"
  loglevel = ${?LOG_LEVEL}
  loggers = ["org.apache.pekko.event.slf4j.Slf4jLogger"]
  logging-filter = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"

  # gRPC is served over cleartext HTTP/2 (design D17).
  http.server.preview.enable-http2 = on

  # Run Coordinated Shutdown (and exit the JVM) on SIGTERM.
  coordinated-shutdown.run-by-jvm-shutdown-hook = on
  coordinated-shutdown.exit-jvm = on

  # actor.provider is set to "cluster" by cluster.conf (design D27).
}
