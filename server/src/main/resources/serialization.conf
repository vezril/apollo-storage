# Event serialization (design D4: Jackson CBOR). Shared by main and test config
# via `include "serialization"`. The domain marker trait is bound to the CBOR
# serializer, and the custom module teaches the mapper the value types + the
# polymorphic Event ADT.

pekko.actor {
  serialization-bindings {
    "apollostorage.domain.CborSerializable" = jackson-cbor
  }
}

pekko.serialization.jackson {
  jackson-modules += "apollostorage.persistence.DomainJacksonModule"
}
