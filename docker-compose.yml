# Self-contained ApolloStorage deployment: the service + its PostgreSQL journal.
# Postgres initializes the event-journal schema from ./ddl on first boot.
#
#   docker compose up
#   curl localhost:8080/health   # -> {"status":"UP",...}
#
# By default this pulls the published image. To run a locally built image:
#   sbt server/Docker/publishLocal
#   APOLLOSTORAGE_IMAGE=apollostorage:<version> docker compose up
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: apollostorage
      POSTGRES_USER: apollostorage
      POSTGRES_PASSWORD: apollostorage
    volumes:
      - ./ddl/create_tables_postgres.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apollostorage -d apollostorage"]
      interval: 5s
      timeout: 3s
      retries: 10

  apollostorage:
    image: ${APOLLOSTORAGE_IMAGE:-calvinference/apollostorage:latest}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HTTP_PORT: "8080"
      GRPC_PORT: "8443"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: apollostorage
      POSTGRES_USER: apollostorage
      POSTGRES_PASSWORD: apollostorage
    ports:
      - "8080:8080" # HTTP health
      - "8443:8443" # gRPC object API
    volumes:
      # Object payloads. A fresh volume inherits the image's uid-1001 ownership,
      # so the blob store is writable out of the box.
      - objects:/var/lib/apollostorage/objects

volumes:
  pgdata:
  objects:
    # Default: a local Docker volume. For NFS-backed storage, uncomment the driver
    # options and set addr/device to your NAS (see README "Mounting NFS object
    # storage").
    # driver: local
    # driver_opts:
    #   type: nfs
    #   o: "addr=192.168.1.10,nfsvers=4.1,rw,hard,timeo=600,retrans=2"
    #   device: ":/volume1/apollostorage/objects"
